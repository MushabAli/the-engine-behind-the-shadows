<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Engine Behind The Shadows - Web Novel</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen flex flex-col pb-20 md:pb-0 bg-[#0d1117] text-[#c9d1d9]">

    <header class="border-b border-gray-800 p-4 sticky top-0 bg-[#0d1117]/90 backdrop-blur-md z-50">
        <div class="mx-auto flex justify-between items-center">
            <h1 class="text-lg md:text-xl font-bold text-red-500 tracking-wider">BEHIND THE SHADOWS</h1>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-5 py-6 flex-grow w-full md:py-12">
        
        <div id="home-view" class="view-section space-y-6 text-center py-8">
            <h2 class="text-2xl md:text-4xl font-extrabold text-white leading-tight">The Engine Behind the Shadows</h2>
            <p class="text-gray-400 italic text-sm md:text-base leading-relaxed">
                "Sebuah esai visual tentang bagaimana sistem, algoritma, dan rekam jejak digital membentuk dan memanipulasi identitas manusia modern."
            </p>
            <img src="../pict/shadow.png" alt="shadow">
            <div class="pt-4">
                <button onclick="bukaBab(1)" class="w-full md:w-auto bg-red-600 hover:bg-red-700 text-white px-8 py-3 rounded-xl font-medium tracking-wide shadow-lg shadow-red-900/20 cursor-pointer" style="margin-top: 20px;">
                    Mulai Membaca
                </button>
            </div>
        </div>

        <div id="reader-view" class="view-section hidden space-y-6">
            <div class="p-5 md:p-6 rounded-2xl bg-[#161b22] border border-[#30363d] shadow-xl">
                <div id="bab-konten-mentah" class="whitespace-pre-line leading-relaxed text-base md:text-lg space-y-4 font-serif"></div>
            </div>
            
            <div id="nav-action-buttons" class="flex gap-3 pt-2"></div>
        </div>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 border-t border-gray-800 bg-[#0d1117]/95 backdrop-blur-md md:bottom-auto md:top-0 md:right-4 md:left-auto md:border-t-0 md:bg-transparent md:h-14 md:flex md:items-center z-50">
        <div class="max-w-2xl mx-auto flex justify-around p-2 w-full md:space-x-4 md:p-0">
            <button onclick="bukaBab(0)" class="nav-btn flex flex-col items-center p-2 text-xs text-red-500 cursor-pointer md:text-sm md:flex-row md:hover:text-red-400">
                <span class="md:hidden text-lg">🏠</span><span class="mt-0.5 md:mt-0">Home</span>
            </button>
            <button onclick="bukaBab(1)" class="nav-btn flex flex-col items-center p-2 text-xs text-gray-400 cursor-pointer md:text-sm md:flex-row md:hover:text-red-400">
                <span class="md:hidden text-lg">📖</span><span class="mt-0.5 md:mt-0">Ch 1</span>
            </button>
            <button onclick="bukaBab(2)" class="nav-btn flex flex-col items-center p-2 text-xs text-gray-400 cursor-pointer md:text-sm md:flex-row md:hover:text-red-400">
                <span class="md:hidden text-lg">🎭</span><span class="mt-0.5 md:mt-0">Ch 2</span>
            </button>
            <button onclick="bukaBab(3)" class="nav-btn flex flex-col items-center p-2 text-xs text-gray-400 cursor-pointer md:text-sm md:flex-row md:hover:text-red-400">
                <span class="md:hidden text-lg">⚡</span><span class="mt-0.5 md:mt-0">Ch 3</span>
            </button>
        </div>
    </nav>
</body>
<footer>
    <script src="script.js"></script>
</footer>
</html>
